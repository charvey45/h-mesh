# Bind the standard MQTT listener on all interfaces inside the container.
listener 1883 0.0.0.0
# The lab and demo brokers are intentionally anonymous and local-trust only.
allow_anonymous true
# Persist retained messages and broker state under the mounted data directory.
persistence true
persistence_location /mosquitto/data/
# Send logs to container stdout so Docker can collect them naturally.
log_dest stdout
