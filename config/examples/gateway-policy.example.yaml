# Example gateway forwarding and control policy.
# This file shows the type of channel-specific rules the Pi gateway is expected to enforce.

# Policy scope for this gateway.
site_code: a
gateway_id: ag01

channels:
  # Shared human traffic can bridge and queue when WAN access is interrupted.
  ops:
    bridge_to_mqtt: true
    allow_from_types: ["g", "r"]
    queue_when_offline: true
  # Telemetry is allowed from gateways and sensors, and the example rate limit
  # shows where noisy devices can be bounded later.
  sensor:
    bridge_to_mqtt: true
    allow_from_types: ["g", "s"]
    queue_when_offline: true
    rate_limit_per_minute: 60
  # Control is intentionally stricter: only gateways originate it in this example,
  # it is not queued offline, and it requires explicit allowlist checks.
  control:
    bridge_to_mqtt: true
    allow_from_types: ["g"]
    queue_when_offline: false
    require_allowlist: true

control:
  # Control settings model a supervised automation boundary, not open-ended remote actuation.
  enabled: true
  approved_senders: ["ag01", "bg02"]
  approved_targets: ["as20"]
  max_runtime_seconds: 30
  fail_safe_state: open
