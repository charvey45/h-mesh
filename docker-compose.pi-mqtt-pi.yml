services:
  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: h-mesh-pi-mqtt-pi-broker
    restart: "no"
    ports:
      - "1884:1883"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  bg02:
    build:
      context: .
      dockerfile: docker/integration/Dockerfile
    container_name: h-mesh-bg02-sim
    depends_on:
      - mqtt-broker
    volumes:
      - sim-ready:/ready
    command:
      - python
      - -m
      - h_mesh_gateway
      - simulate-mqtt-to-radio
      - --env
      - /app/config/examples/bg02.pi-sim.env.example
      - --topic
      - mesh/v1/site-a/ops/up
      - --radio-output
      - /tmp/bg02-radio-out.json
      - --ready-file
      - /ready/bg02-subscribed.json
      - --timeout-seconds
      - "20"
      - --json
    restart: "no"

  ag01-health-watch:
    build:
      context: .
      dockerfile: docker/integration/Dockerfile
    container_name: h-mesh-ag01-health-watch
    depends_on:
      - mqtt-broker
    volumes:
      - sim-ready:/ready
    command:
      - python
      - -m
      - h_mesh_gateway
      - observe-topic
      - --env
      - /app/config/examples/ag01.pi-sim.env.example
      - --topic
      - mesh/v1/site-a/gateway/ag01/state
      - --ready-file
      - /ready/ag01-health-watch-subscribed.json
      - --max-messages
      - "2"
      - --timeout-seconds
      - "20"
      - --json
    restart: "no"

  ag01:
    build:
      context: .
      dockerfile: docker/integration/Dockerfile
    container_name: h-mesh-ag01-sim
    depends_on:
      - mqtt-broker
      - bg02
      - ag01-health-watch
    volumes:
      - sim-ready:/ready
    command:
      - /bin/sh
      - -lc
      - python -m h_mesh_gateway wait-for-files --path /ready/bg02-subscribed.json --path /ready/ag01-health-watch-subscribed.json --timeout-seconds 20 --json && python -m h_mesh_gateway simulate-rf-to-mqtt --env /app/config/examples/ag01.pi-sim.env.example --payload-file /app/docker/integration/fixtures/ops-broadcast.json --json
    restart: "no"

volumes:
  sim-ready:
