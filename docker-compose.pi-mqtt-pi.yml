# Integration harness for the documented ag01 -> MQTT -> bg02 flow.
# This stack is intentionally disposable and exists to prove the gateway code path, not to model production.
services:
  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: h-mesh-pi-mqtt-pi-broker
    restart: "no"
    ports:
      # Use 1884 on the host so this harness can run alongside the normal lab broker on 1883.
      - "1884:1883"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  bg02:
    build:
      context: .
      dockerfile: docker/integration/Dockerfile
    container_name: h-mesh-bg02-sim
    depends_on:
      - mqtt-broker
    command:
      # bg02 blocks waiting for MQTT, then emits the payload to a file-backed radio adapter.
      - python
      - -m
      - h_mesh_gateway
      - simulate-mqtt-to-radio
      - --env
      - /app/config/examples/bg02.pi-sim.env.example
      - --topic
      - mesh/v1/site-a/ops/up
      - --radio-output
      - /tmp/bg02-radio-out.json
      - --ready-file
      - /tmp/bg02-subscribed.json
      - --timeout-seconds
      - "20"
      - --json
    healthcheck:
      # The subscriber writes a ready file after the MQTT subscription is actually active.
      test: ["CMD", "test", "-f", "/tmp/bg02-subscribed.json"]
      interval: 1s
      timeout: 1s
      retries: 20
    restart: "no"

  ag01-health-watch:
    build:
      context: .
      dockerfile: docker/integration/Dockerfile
    container_name: h-mesh-ag01-health-watch
    depends_on:
      - mqtt-broker
    command:
      # A separate observer watches the gateway health topic so the harness can assert health publication.
      - python
      - -m
      - h_mesh_gateway
      - observe-topic
      - --env
      - /app/config/examples/ag01.pi-sim.env.example
      - --topic
      - mesh/v1/site-a/gateway/ag01/state
      - --ready-file
      - /tmp/ag01-health-watch-subscribed.json
      - --max-messages
      - "2"
      - --timeout-seconds
      - "20"
      - --json
    healthcheck:
      # Like bg02, the observer advertises readiness through a file once the broker subscription is live.
      test: ["CMD", "test", "-f", "/tmp/ag01-health-watch-subscribed.json"]
      interval: 1s
      timeout: 1s
      retries: 20
    restart: "no"

  ag01:
    build:
      context: .
      dockerfile: docker/integration/Dockerfile
    container_name: h-mesh-ag01-sim
    depends_on:
      # ag01 only starts publishing after the broker is up and both subscribers are ready.
      mqtt-broker:
        condition: service_started
      bg02:
        condition: service_healthy
      ag01-health-watch:
        condition: service_healthy
    command:
      # ag01 injects a fixture as if it arrived over RF and lets the gateway service bridge it to MQTT.
      - python
      - -m
      - h_mesh_gateway
      - simulate-rf-to-mqtt
      - --env
      - /app/config/examples/ag01.pi-sim.env.example
      - --payload-file
      - /app/docker/integration/fixtures/ops-broadcast.json
      - --json
    restart: "no"
